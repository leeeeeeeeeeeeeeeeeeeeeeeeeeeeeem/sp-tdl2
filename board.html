<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시판 — se.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── 게시판 전용 추가 스타일 ── */
    .hidden { display: none !important; }

    .btn-sm { padding: 0.5rem 1.1rem; font-size: 0.82rem; }

    .btn-danger {
      background: rgba(239, 68, 68, 0.12);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.22);
      border-color: rgba(239, 68, 68, 0.55);
      transform: translateY(-1px);
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: none;
      color: var(--text-2);
      font-family: var(--font-d);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0.4rem 0;
      margin-bottom: 1.25rem;
      transition: color var(--t);
    }
    .btn-back:hover { color: var(--blue-b); }

    /* ── 툴바 ── */
    .board-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .board-desc { font-size: 0.9rem; color: var(--text-2); }

    /* ── 목록 ── */
    .board-list { overflow: hidden; padding: 0; }

    .board-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 4rem 2rem;
      color: var(--text-3);
      font-size: 0.9rem;
    }
    .board-empty span { font-size: 2rem; }

    .post-item {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--t);
    }
    .post-item:last-child { border-bottom: none; }
    .post-item:hover { background: var(--card-h); }

    .post-item-num {
      font-family: var(--font-m);
      font-size: 0.72rem;
      color: var(--text-3);
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }
    .post-item-content { flex: 1; min-width: 0; }
    .post-item-title {
      font-family: var(--font-d);
      font-size: 0.975rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.2rem;
    }
    .post-item-meta {
      font-family: var(--font-m);
      font-size: 0.72rem;
      color: var(--text-3);
      display: flex;
      gap: 0.5rem;
    }
    .meta-sep { color: var(--text-3); }
    .post-item-arrow {
      color: var(--text-3);
      font-size: 0.9rem;
      flex-shrink: 0;
      transition: var(--t);
    }
    .post-item:hover .post-item-arrow {
      color: var(--blue-b);
      transform: translateX(3px);
    }

    /* ── 페이지네이션 ── */
    .board-pagination {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1.25rem;
    }
    .page-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-2);
      font-family: var(--font-d);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--t);
      display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover { border-color: var(--border-h); color: var(--blue-b); }
    .page-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* ── 상세 ── */
    .post-detail { padding: 2rem 2.25rem; }
    .post-detail-header {
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.75rem;
    }
    .post-detail-title {
      font-family: var(--font-d);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
      line-height: 1.3;
    }
    .post-detail-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-m);
      font-size: 0.78rem;
      color: var(--text-3);
    }
    .post-detail-body {
      color: var(--text-2);
      font-size: 0.975rem;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 120px;
      margin-bottom: 2rem;
    }
    .post-detail-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.6rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    /* ── 폼 ── */
    .post-form { padding: 2rem 2.25rem; }
    .form-title {
      font-family: var(--font-d);
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 1.75rem;
      letter-spacing: -0.02em;
    }
    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block;
      font-family: var(--font-m);
      font-size: 0.72rem;
      color: var(--blue);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .form-input, .form-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: var(--font-b);
      font-size: 0.95rem;
      transition: border-color var(--t), box-shadow var(--t);
      outline: none;
      resize: vertical;
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--border-h);
      box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.12);
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-3); }
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.6rem;
      margin-top: 1.5rem;
    }

    /* ── 토스트 ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card);
      border: 1px solid var(--border-h);
      border-radius: 10px;
      padding: 0.75rem 1.5rem;
      font-family: var(--font-d);
      font-size: 0.875rem;
      color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      z-index: 999;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
      opacity: 0;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-color: rgba(79,209,197,0.5); color: var(--cyan); }
    #toast.error   { border-color: rgba(239,68,68,0.4);  color: #f87171; }

    /* ── 반응형 ── */
    @media (max-width: 768px) {
      .board-toolbar { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .post-item { padding: 1rem 1.25rem; gap: 0.75rem; }
      .post-detail, .post-form { padding: 1.5rem 1.25rem; }
      .post-detail-title { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header id="header">
    <div class="header-inner">
      <a href="index.html#hero" class="logo">se<span>.</span></a>
      <nav class="nav-links">
        <a href="index.html#about">자기소개</a>
        <a href="board.html" style="color: var(--blue-b);">게시판</a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html#about" class="mobile-link">자기소개</a>
      <a href="board.html" class="mobile-link">게시판</a>
    </div>
  </header>

  <!-- ── 게시판 본문 ── -->
  <section class="page-section" id="board" style="padding-top: 7.5rem;">
    <div class="container">

      <div class="sec-header">
        <span class="sec-num">05</span>
        <h2 class="sec-title">게시판</h2>
      </div>

      <div id="board-app">

        <!-- 목록 뷰 -->
        <div id="view-list">
          <div class="board-toolbar">
            <p class="board-desc">자유롭게 글을 남겨주세요.</p>
            <button class="btn btn-primary btn-sm" id="btn-new-post">✏ 글쓰기</button>
          </div>
          <div class="board-list card" id="post-list">
            <div class="board-empty" id="board-empty">
              <span>📭</span>
              <p>아직 작성된 글이 없습니다.</p>
            </div>
          </div>
          <div class="board-pagination" id="pagination"></div>
        </div>

        <!-- 상세 뷰 -->
        <div id="view-detail" class="hidden">
          <button class="btn-back" id="btn-back-list">← 목록으로</button>
          <div class="card post-detail">
            <div class="post-detail-header">
              <h3 class="post-detail-title" id="detail-title"></h3>
              <div class="post-detail-meta">
                <span id="detail-author"></span>
                <span class="meta-sep">·</span>
                <span id="detail-date"></span>
              </div>
            </div>
            <div class="post-detail-body" id="detail-body"></div>
            <div class="post-detail-actions">
              <button class="btn btn-outline btn-sm" id="btn-edit-post">수정</button>
              <button class="btn btn-danger btn-sm" id="btn-delete-post">삭제</button>
            </div>
          </div>
        </div>

        <!-- 글쓰기 / 수정 폼 -->
        <div id="view-form" class="hidden">
          <button class="btn-back" id="btn-back-form">← 돌아가기</button>
          <div class="card post-form">
            <h3 class="form-title" id="form-title-label">새 글 쓰기</h3>
            <div class="form-group">
              <label class="form-label" for="input-title">제목</label>
              <input class="form-input" type="text" id="input-title" placeholder="제목을 입력하세요" maxlength="100" />
            </div>
            <div class="form-group">
              <label class="form-label" for="input-author">작성자</label>
              <input class="form-input" type="text" id="input-author" placeholder="이름 (비워두면 익명)" maxlength="30" />
            </div>
            <div class="form-group">
              <label class="form-label" for="input-body">내용</label>
              <textarea class="form-textarea" id="input-body" placeholder="내용을 입력하세요" rows="8"></textarea>
            </div>
            <div class="form-actions">
              <button class="btn btn-outline btn-sm" id="btn-cancel-form">취소</button>
              <button class="btn btn-primary btn-sm" id="btn-submit-form">등록</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- ── FOOTER ── -->
  <footer id="footer">
    <div class="footer-inner">
      <span>© 2026 se. All rights reserved.</span>
      <span>Made with <span class="heart">♥</span> HTML · CSS · JS</span>
    </div>
  </footer>

  <!-- 토스트 -->
  <div id="toast"></div>

  <script>
    /* ===================================================
       board.js — localStorage 기반 게시판 CRUD
    =================================================== */

    const PAGE_SIZE = 10;
    let allPosts      = [];
    let currentPage   = 1;
    let editingPostId = null;
    let currentPostId = null;

    /* ── DOM ── */
    const viewList   = document.getElementById('view-list');
    const viewDetail = document.getElementById('view-detail');
    const viewForm   = document.getElementById('view-form');
    const postList   = document.getElementById('post-list');
    const boardEmpty = document.getElementById('board-empty');
    const pagination = document.getElementById('pagination');

    /* ── 뷰 전환 ── */
    function showView(name) {
      viewList.classList.add('hidden');
      viewDetail.classList.add('hidden');
      viewForm.classList.add('hidden');
      document.getElementById('view-' + name).classList.remove('hidden');
      window.scrollTo({ top: document.getElementById('board').offsetTop - 80, behavior: 'smooth' });
    }

    /* ── localStorage 헬퍼 ── */
    function loadFromStorage() {
      try {
        const raw = localStorage.getItem('board_posts');
        return raw ? JSON.parse(raw) : [];
      } catch { return []; }
    }
    function saveToStorage(posts) {
      localStorage.setItem('board_posts', JSON.stringify(posts));
    }

    /* ── 날짜 포맷 ── */
    function formatDate(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    /* ── 토스트 ── */
    let toastTimer = null;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = ''; }, 2800);
    }

    /* ── XSS 방지 ── */
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ── 목록 렌더링 ── */
    function renderList() {
      allPosts = loadFromStorage();
      const total      = allPosts.length;
      const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
      if (currentPage > totalPages) currentPage = totalPages;
      const start     = (currentPage - 1) * PAGE_SIZE;
      const pagePosts = allPosts.slice(start, start + PAGE_SIZE);

      if (total === 0) {
        postList.innerHTML = '';
        postList.appendChild(boardEmpty);
        boardEmpty.classList.remove('hidden');
        pagination.innerHTML = '';
        return;
      }

      boardEmpty.classList.add('hidden');
      postList.innerHTML = pagePosts.map((post, idx) => `
        <div class="post-item" data-id="${post.id}">
          <span class="post-item-num">${total - start - idx}</span>
          <div class="post-item-content">
            <div class="post-item-title">${escapeHtml(post.title)}</div>
            <div class="post-item-meta">
              <span>${escapeHtml(post.author || '익명')}</span>
              <span class="meta-sep">·</span>
              <span>${formatDate(post.createdAt)}</span>
            </div>
          </div>
          <span class="post-item-arrow">→</span>
        </div>
      `).join('');

      postList.querySelectorAll('.post-item').forEach(el => {
        el.addEventListener('click', () => openDetail(el.dataset.id));
      });

      // 페이지네이션
      pagination.innerHTML = '';
      if (totalPages > 1) {
        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement('button');
          btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
          btn.textContent = i;
          btn.addEventListener('click', () => { currentPage = i; renderList(); });
          pagination.appendChild(btn);
        }
      }
    }

    /* ── 상세 열기 ── */
    function openDetail(postId) {
      allPosts = loadFromStorage();
      const post = allPosts.find(p => p.id === postId);
      if (!post) return;

      currentPostId = postId;
      document.getElementById('detail-title').textContent  = post.title;
      document.getElementById('detail-author').textContent = post.author || '익명';
      document.getElementById('detail-date').textContent   = formatDate(post.createdAt);
      document.getElementById('detail-body').textContent   = post.body;

      document.getElementById('btn-edit-post').dataset.id   = postId;
      document.getElementById('btn-delete-post').dataset.id = postId;
      showView('detail');
    }

    /* ── 글쓰기 폼 ── */
    function openNewForm() {
      editingPostId = null;
      document.getElementById('form-title-label').textContent = '새 글 쓰기';
      document.getElementById('btn-submit-form').textContent  = '등록';
      document.getElementById('input-title').value  = '';
      document.getElementById('input-author').value = '';
      document.getElementById('input-body').value   = '';
      showView('form');
    }

    /* ── 수정 폼 ── */
    function openEditForm(postId) {
      allPosts = loadFromStorage();
      const post = allPosts.find(p => p.id === postId);
      if (!post) return;
      editingPostId = postId;
      document.getElementById('form-title-label').textContent = '글 수정';
      document.getElementById('btn-submit-form').textContent  = '수정 완료';
      document.getElementById('input-title').value  = post.title;
      document.getElementById('input-author').value = post.author || '';
      document.getElementById('input-body').value   = post.body;
      showView('form');
    }

    /* ── 저장 (등록 / 수정) ── */
    function submitForm() {
      const title  = document.getElementById('input-title').value.trim();
      const author = document.getElementById('input-author').value.trim() || '익명';
      const body   = document.getElementById('input-body').value.trim();

      if (!title) { showToast('제목을 입력해주세요.', 'error'); document.getElementById('input-title').focus(); return; }
      if (!body)  { showToast('내용을 입력해주세요.', 'error'); document.getElementById('input-body').focus();  return; }

      allPosts = loadFromStorage();

      if (editingPostId) {
        const idx = allPosts.findIndex(p => p.id === editingPostId);
        if (idx !== -1) {
          allPosts[idx] = { ...allPosts[idx], title, author, body, updatedAt: Date.now() };
        }
        saveToStorage(allPosts);
        showToast('글이 수정되었습니다.', 'success');
        editingPostId = null;
      } else {
        const newPost = {
          id: 'post_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
          title,
          author,
          body,
          createdAt: Date.now()
        };
        allPosts.unshift(newPost); // 최신순 앞에 추가
        saveToStorage(allPosts);
        showToast('글이 등록되었습니다.', 'success');
      }

      currentPage = 1;
      renderList();
      showView('list');
    }

    /* ── 삭제 ── */
    function deletePost(postId) {
      if (!confirm('정말 삭제하시겠습니까?')) return;
      allPosts = loadFromStorage();
      const filtered = allPosts.filter(p => p.id !== postId);
      saveToStorage(filtered);
      showToast('글이 삭제되었습니다.', 'success');
      currentPage = 1;
      renderList();
      showView('list');
    }

    /* ── 이벤트 바인딩 ── */
    document.getElementById('btn-new-post').addEventListener('click', openNewForm);

    document.getElementById('btn-back-list').addEventListener('click', () => { showView('list'); renderList(); });
    document.getElementById('btn-back-form').addEventListener('click', () => {
      if (editingPostId) { openDetail(editingPostId); }
      else { showView('list'); renderList(); }
    });
    document.getElementById('btn-cancel-form').addEventListener('click', () => {
      if (editingPostId) { openDetail(editingPostId); }
      else { showView('list'); renderList(); }
    });

    document.getElementById('btn-edit-post').addEventListener('click', e => {
      openEditForm(e.currentTarget.dataset.id);
    });
    document.getElementById('btn-delete-post').addEventListener('click', e => {
      deletePost(e.currentTarget.dataset.id);
    });

    document.getElementById('btn-submit-form').addEventListener('click', submitForm);

    // 엔터 키로 폼 제출
    document.getElementById('input-title').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('input-body').focus();
    });

    /* ── 햄버거 메뉴 ── */
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });

    /* ── 초기 렌더링 ── */
    renderList();
  </script>
</body>
</html>
